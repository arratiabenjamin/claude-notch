name: ClaudeNotch
options:
  bundleIdPrefix: com.velion
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: NO
    PRODUCT_NAME: "Claude Notch"
    SWIFT_STRICT_CONCURRENCY: complete
targets:
  ClaudeNotch:
    type: application
    platform: macOS
    sources:
      - path: Sources/ClaudeNotch
      - path: Resources/Assets.xcassets
    dependencies:
      - package: Sparkle
    info:
      path: Resources/Info.plist
      properties:
        LSUIElement: false
        NSPrincipalClass: NSApplication
        CFBundleDisplayName: "Claude Notch"
        CFBundleName: "Claude Notch"
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundlePackageType: APPL
        CFBundleIconName: AppIcon
        CFBundleIconFile: AppIcon
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSHumanReadableCopyright: "Copyright © 2026 Benjamín Arratia / Velion. MIT licensed."
        NSUserNotificationsUsageDescription: "Claude Notch shows alerts when Claude finishes a long task or when multiple sessions are active."
        NSAppleEventsUsageDescription: "Claude Notch uses AppleScript to open Terminal at a session's working directory."
        # Sparkle 2 update channel.
        # SUFeedURL → appcast tracked in the main repo.
        # SUPublicEDKey → EdDSA public key generated locally with
        # `generate_keys`. The matching private key lives ONLY in the
        # developer's macOS Keychain — `sign_update` reads it to sign each
        # release zip before it's uploaded.
        SUFeedURL: "https://raw.githubusercontent.com/arratiabenjamin/claude-notch/main/appcast.xml"
        SUPublicEDKey: "uoq/b26XC/VodBNcUsDMgFEg3EwCyS5oOn/hh+AHf5E="
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.velion.claude-notch
        PRODUCT_MODULE_NAME: ClaudeNotch
        # Sparkle compares CFBundleShortVersionString to decide if an update
        # is newer. Bump MARKETING_VERSION every release; bump
        # CURRENT_PROJECT_VERSION (build number) too — they don't have to
        # match in marketing terms but both must increase monotonically.
        MARKETING_VERSION: "2.8.0"
        CURRENT_PROJECT_VERSION: "280"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  ClaudeNotchTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/ClaudeNotchTests
    dependencies:
      - target: ClaudeNotch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.velion.claude-notch.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Claude Notch.app/Contents/MacOS/Claude Notch"
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_STRICT_CONCURRENCY: complete
        PRODUCT_MODULE_NAME: ClaudeNotchTests
        SWIFT_INSTALL_OBJC_HEADER: NO
  ClaudeNotchSaver:
    type: com.apple.product-type.bundle
    platform: macOS
    sources:
      - path: Sources/ClaudeNotchSaver
      - path: Sources/ClaudeNotch/Domain/SessionState.swift
      - path: Sources/ClaudeNotch/Infrastructure/JSONLoader.swift
      - path: Sources/ClaudeNotch/Presentation/Orb/VelionHologram.swift
      - path: Sources/ClaudeNotch/Presentation/Orb/VelionSatelliteHologram.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.velion.claude-notch.saver
        PRODUCT_NAME: "Claude Notch Velion"
        PRODUCT_MODULE_NAME: ClaudeNotchSaver
        WRAPPER_EXTENSION: saver
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSPrincipalClass: ClaudeNotchSaver
        INFOPLIST_KEY_CFBundlePackageType: BNDL
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 Benjamín Arratia / Velion. MIT licensed."
        SKIP_INSTALL: YES
        SWIFT_INSTALL_OBJC_HEADER: NO
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @loader_path/../Frameworks @executable_path/../Frameworks /System/Library/Frameworks"
        FRAMEWORK_SEARCH_PATHS: "$(inherited) /System/Library/Frameworks"
schemes:
  ClaudeNotch:
    build:
      targets:
        ClaudeNotch: all
        ClaudeNotchTests: [test]
    test:
      targets:
        - ClaudeNotchTests
  ClaudeNotchSaver:
    build:
      targets:
        ClaudeNotchSaver: all
