name: ClaudeNotch
options:
  bundleIdPrefix: com.velion
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: NO
    PRODUCT_NAME: "Claude Notch"
    SWIFT_STRICT_CONCURRENCY: complete
targets:
  ClaudeNotch:
    type: application
    platform: macOS
    sources:
      - path: Sources/ClaudeNotch
      - path: Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.velion.claude-notch
        PRODUCT_MODULE_NAME: ClaudeNotch
        INFOPLIST_KEY_LSUIElement: NO
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        INFOPLIST_KEY_CFBundleDisplayName: "Claude Notch"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        INFOPLIST_KEY_CFBundleIconFile: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSMinimumSystemVersion: "14.0"
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 Benjamín Arratia / Velion. MIT licensed."
        INFOPLIST_KEY_NSUserNotificationsUsageDescription: "Claude Notch shows alerts when Claude finishes a long task or when multiple sessions are active."
        INFOPLIST_KEY_NSAppleEventsUsageDescription: "Claude Notch uses AppleScript to open Terminal at a session's working directory."
  ClaudeNotchTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/ClaudeNotchTests
    dependencies:
      - target: ClaudeNotch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.velion.claude-notch.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Claude Notch.app/Contents/MacOS/Claude Notch"
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_STRICT_CONCURRENCY: complete
        PRODUCT_MODULE_NAME: ClaudeNotchTests
        SWIFT_INSTALL_OBJC_HEADER: NO
  ClaudeNotchSaver:
    type: com.apple.product-type.bundle
    platform: macOS
    sources:
      - path: Sources/ClaudeNotchSaver
      - path: Sources/ClaudeNotch/Domain/SessionState.swift
      - path: Sources/ClaudeNotch/Infrastructure/JSONLoader.swift
      - path: Sources/ClaudeNotch/Presentation/Orb/VelionOrb.swift
      - path: Sources/ClaudeNotch/Presentation/Orb/SatelliteOrb.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.velion.claude-notch.saver
        PRODUCT_NAME: "Claude Notch Velion"
        PRODUCT_MODULE_NAME: ClaudeNotchSaver
        WRAPPER_EXTENSION: saver
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSPrincipalClass: ClaudeNotchSaver
        INFOPLIST_KEY_CFBundlePackageType: BNDL
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 Benjamín Arratia / Velion. MIT licensed."
        SKIP_INSTALL: YES
        SWIFT_INSTALL_OBJC_HEADER: NO
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @loader_path/../Frameworks @executable_path/../Frameworks /System/Library/Frameworks"
        FRAMEWORK_SEARCH_PATHS: "$(inherited) /System/Library/Frameworks"
schemes:
  ClaudeNotch:
    build:
      targets:
        ClaudeNotch: all
        ClaudeNotchTests: [test]
    test:
      targets:
        - ClaudeNotchTests
  ClaudeNotchSaver:
    build:
      targets:
        ClaudeNotchSaver: all
